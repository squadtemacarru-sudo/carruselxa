<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel</title>
<link id="font-display-link" rel="stylesheet" href="">
<link id="font-body-link"    rel="stylesheet" href="">
<link id="font-mono-link"    rel="stylesheet" href="">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=block">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font-body); background: #0a0a0a; }

  :root {
    --font-display:   'Inter', sans-serif;
    --font-body:      'Inter', sans-serif;
    --font-mono:      monospace;
    --color-fondo:    #0a0a0a;
    --color-headline: #ffffff;
    --color-body:     rgba(255,255,255,0.75);
    --color-acento:   #e8ff00;
    --color-sec:      rgba(255,255,255,0.25);
    --pad:            108px;
    --safe-top:       252px;
    --safe-bottom:    200px;
    --gap:            64px;
    --lh-headline:    0.88;
    --lh-body:        1.75;
  }

  /* ══════════════════════════════════════════
     SLIDE SHELL
  ══════════════════════════════════════════ */
  .slide-wrapper {
    width: 1080px;
    aspect-ratio: 9/16;
    background: var(--color-fondo);
    position: relative;
    overflow: hidden;
  }

  .slide {
    width: 100%; height: 100%;
    display: none;
    position: relative;
    padding: var(--safe-top) var(--pad) var(--safe-bottom);
  }
  .slide.active { display: flex; }

  /* ── Foto de fondo ── */
  .slide > .slide-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center top;
    z-index: 0;
  }
  .slide-bg::after {
    content: ''; position: absolute; inset: 0;
    /* Capa plana de oscurecido (--overlay, decidida por la IA por foto)
       sobre el degradé direccional (--grad, según zona de texto) */
    background: linear-gradient(rgba(0,0,0, var(--overlay, 0.45)), rgba(0,0,0, var(--overlay, 0.45))), var(--grad);
  }

  /* ── Gradientes ── */
  .grad-top_heavy    { --grad: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.50) 40%, transparent 70%, rgba(0,0,0,0.40) 100%); }
  .grad-bottom_heavy { --grad: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 35%, rgba(0,0,0,0.75) 65%, rgba(0,0,0,0.97) 100%); }
  .grad-both         { --grad: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.35) 32%, rgba(0,0,0,0.35) 62%, rgba(0,0,0,0.92) 100%); }
  .grad-center_clear { --grad: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.42) 28%, rgba(0,0,0,0.42) 72%, rgba(0,0,0,0.88) 100%); }
  .grad-full         { --grad: linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)); }

  .slide > * { position: relative; z-index: 1; }

  /* ── Tag ── */
  .slide-tag {
    position: absolute;
    top: var(--safe-top); left: var(--pad);
    font-family: var(--font-mono);
    font-size: 26px; letter-spacing: 0.22em;
    color: var(--color-sec);
  }

  /* ── Logo de marca (watermark) ── */
  .brand-logo {
    position: absolute;
    bottom: var(--safe-bottom);
    right: var(--pad);
    width: 56px;
    height: 56px;
    object-fit: contain;
    opacity: 0.55;
  }

  /* ── Text shadows ── */
  .ts-suave  * { text-shadow: 0 2px 12px rgba(0,0,0,0.55); }
  .ts-medio  * { text-shadow: 0 2px 8px rgba(0,0,0,0.88), 0 4px 24px rgba(0,0,0,0.72); }
  .ts-fuerte * { text-shadow: 0 1px 4px rgba(0,0,0,0.97), 0 3px 16px rgba(0,0,0,0.92), 0 6px 40px rgba(0,0,0,0.85); }

  /* ── Glass ── */
  .glass-wrap {
    background: var(--glass-bg, rgba(4,4,6,0.82));
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border-radius: 10px;
    padding: 48px; margin: -48px;
  }

  /* ── Headline sizes ── */
  .hs-reducir_20  .h-display { font-size: 80px !important; }
  .hs-reducir_10  .h-display { font-size: 90px !important; }
  .hs-normal      .h-display { }
  .hs-aumentar_10 .h-display { font-size: 110px !important; }

  /* ══════════════════════════════════════════
     COMPONENTES COMPARTIDOS
  ══════════════════════════════════════════ */

  .c-eyebrow {
    font-family: var(--font-body);
    font-size: 26px; font-weight: 600;
    color: var(--color-sec);
    text-transform: uppercase; letter-spacing: 0.18em;
    line-height: 1.6;
  }
  .c-headline {
    font-family: var(--font-display);
    font-size: 100px; font-weight: 900;
    color: var(--color-headline);
    text-transform: uppercase;
    line-height: var(--lh-headline);
    white-space: pre-line;
    overflow-wrap: break-word;
  }
  .c-body {
    font-family: var(--font-body);
    font-size: 38px; color: var(--color-body);
    line-height: var(--lh-body);
    white-space: pre-line;
  }
  .c-kicker {
    display: flex; align-items: center; gap: 40px;
    min-width: 0;
  }
  .c-kicker-line { width: 80px; height: 3px; background: var(--color-acento); flex-shrink: 0; }
  .c-kicker-text {
    font-family: var(--font-display);
    font-size: 48px; font-weight: 700;
    color: var(--color-headline);
    overflow-wrap: break-word;
    min-width: 0;
  }
  .c-divider-slash {
    display: flex; gap: 18px; align-items: center;
  }
  .c-divider-slash span {
    font-size: 52px; font-weight: 300;
    color: var(--color-acento); opacity: 0.9;
    line-height: 1;
  }
  .c-divider-line {
    width: 80px; height: 3px;
    background: var(--color-acento); opacity: 0.6;
  }
  .c-swipe {
    font-family: var(--font-mono);
    font-size: 26px; letter-spacing: 0.25em;
    color: var(--color-sec);
  }
  .c-handle {
    font-family: var(--font-mono);
    font-size: 26px; letter-spacing: 0.18em;
    color: var(--color-sec);
  }
  .c-arrow-box {
    width: 72px; height: 72px;
    border: 2px solid var(--color-acento);
    opacity: 0.5;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; color: var(--color-acento);
  }

  /* ══════════════════════════════════════════
     COVER — layouts
  ══════════════════════════════════════════ */

  /* cover-top: headline arriba, footer abajo */
  .layout-cover-top {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-cover-top .cover-main {
    display: flex; flex-direction: column;
    gap: var(--gap);
    margin-top: calc(var(--pad) * 1.2);
  }
  /* Cuando hay foto + _textY, el wrap absolute ya maneja la posición.
     Limitar la altura máxima evita que el bloque de texto baje al sujeto
     aunque el headline sea muy largo. */
  .has-photo .cover-main {
    max-height: 44%;
    overflow: hidden;
  }

  /* tp-middle / tp-bottom: la IA detectó que el sujeto ocupa la zona
     superior de la foto — bajamos el bloque de texto para no tapar
     caras/cuerpos. El swipe se ancla abajo-izquierda como en cover-center. */
  .layout-cover-top.tp-middle { justify-content: center; }
  .layout-cover-top.tp-bottom { justify-content: flex-end; }
  .layout-cover-top.tp-middle .cover-main,
  .layout-cover-top.tp-bottom .cover-main {
    margin-top: 0;
  }
  .layout-cover-top.tp-middle .c-swipe,
  .layout-cover-top.tp-bottom .c-swipe {
    position: absolute; bottom: var(--safe-bottom); left: var(--pad);
  }

  /* cover-center: todo centrado verticalmente */
  .layout-cover-center {
    flex-direction: column;
    justify-content: center;
    gap: var(--gap);
  }
  .layout-cover-center .cover-main {
    display: flex; flex-direction: column; gap: var(--gap);
  }
  .layout-cover-center .c-swipe {
    margin-top: auto;
    position: absolute;
    bottom: var(--safe-bottom); left: var(--pad);
  }

  /* cover-split: headline izquierda grande, detail derecha */
  .layout-cover-split {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-cover-split .cover-main {
    margin-top: calc(var(--pad) * 1.2);
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 48px;
    align-items: end;
  }
  .layout-cover-split .cover-left,
  .layout-cover-split .cover-right {
    min-width: 0;
  }
  .layout-cover-split .cover-right {
    display: flex; flex-direction: column; gap: 32px;
    padding-bottom: 8px;
  }

  /* ══════════════════════════════════════════
     LIST — layouts
  ══════════════════════════════════════════ */

  /* list-full: distribuye los items en todo el alto de la slide */
  .layout-list-full {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-list-full .list-header {
    margin-top: calc(var(--pad) * 1.2);
  }
  .layout-list-full .list-items {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: space-evenly;
    list-style: none;
    padding: 32px 0;
  }
  .layout-list-full .list-item {
    display: flex; align-items: center; gap: 36px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 20px 0;
  }
  .layout-list-full .list-item:last-child { border-bottom: none; }

  /* list-compact: items juntos, centrados verticalmente */
  .layout-list-compact {
    flex-direction: column;
    justify-content: center;
    gap: 56px;
  }
  .layout-list-compact .list-items {
    list-style: none;
    display: flex; flex-direction: column; gap: 44px;
  }
  .layout-list-compact .list-item {
    display: flex; align-items: flex-start; gap: 32px;
  }

  /* list-numbered-hero: números grandes como elemento visual */
  .layout-list-hero {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-list-hero .list-header {
    margin-top: calc(var(--pad) * 1.2);
  }
  .layout-list-hero .list-items {
    flex: 1; list-style: none;
    display: flex; flex-direction: column;
    justify-content: space-evenly;
    padding: 24px 0;
  }
  .layout-list-hero .list-item {
    display: flex; align-items: center; gap: 32px;
  }
  .layout-list-hero .list-num-hero {
    font-family: var(--font-display);
    font-size: 80px; font-weight: 900;
    color: var(--color-acento);
    opacity: 0.18; line-height: 1;
    min-width: 80px; flex-shrink: 0;
  }

  /* Shared list num */
  .list-num {
    font-family: var(--font-mono);
    font-size: 24px; color: var(--color-acento);
    opacity: 0.5; flex-shrink: 0;
    min-width: 48px;
  }
  .list-num-bracket {
    font-family: var(--font-mono);
    font-size: 22px; color: var(--color-sec);
    flex-shrink: 0; min-width: 52px;
  }
  .list-text {
    font-family: var(--font-body);
    font-size: 42px; font-weight: 600;
    color: var(--color-headline);
    line-height: 1.25;
  }
  .list-text-sm {
    font-family: var(--font-body);
    font-size: 36px; font-weight: 500;
    color: var(--color-headline);
    line-height: 1.3;
  }

  /* ══════════════════════════════════════════
     STATEMENT — layouts
  ══════════════════════════════════════════ */

  /* statement-anchored: headline + divider + body como bloque único, centrado */
  .layout-statement-anchored {
    flex-direction: column;
    justify-content: center;
    gap: 52px;
  }

  /* statement-top: headline top, body bottom */
  .layout-statement-top {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-statement-top .stmt-top {
    margin-top: calc(var(--pad) * 1.2);
    display: flex; flex-direction: column; gap: 48px;
  }
  .layout-statement-top .stmt-bottom {
    display: flex; flex-direction: column; gap: 32px;
  }
  .layout-statement-top .stmt-photo-body {
    position: absolute; bottom: var(--safe-bottom); left: var(--pad); right: var(--pad);
    display: flex; flex-direction: column; gap: 20px; z-index: 2;
  }

  /* tp-middle / tp-bottom: mismo criterio que cover-top — bajamos el
     headline si el sujeto de la foto está arriba. */
  .layout-statement-top.tp-middle { justify-content: center; gap: 52px; }
  .layout-statement-top.tp-bottom { justify-content: flex-end; }
  .layout-statement-top.tp-middle .stmt-top,
  .layout-statement-top.tp-bottom .stmt-top {
    margin-top: 0;
  }

  /* statement-impact: headline XL ocupa más, body pequeño abajo */
  .layout-statement-impact {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-statement-impact .stmt-headline {
    margin-top: calc(var(--pad) * 1.2);
    font-size: 128px !important;
  }
  .layout-statement-impact .stmt-body-wrap {
    display: flex; flex-direction: column; gap: 28px;
  }

  /* ══════════════════════════════════════════
     SPLIT — layouts
  ══════════════════════════════════════════ */

  /* split-full: columnas llenan todo el alto disponible */
  .layout-split-full {
    flex-direction: column;
  }
  .layout-split-full .split-tag-row {
    display: flex; align-items: center;
    padding-top: calc(var(--pad) * 1.2);
    margin-bottom: 36px;
  }
  .layout-split-full .split-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding-bottom: 0;
  }
  .layout-split-full .split-col {
    display: flex; flex-direction: column;
    padding: 44px;
  }
  .layout-split-full .split-col.dark {
    border: 1px solid rgba(255,255,255,0.10);
  }
  .layout-split-full .split-col.light { background: #fff; }
  .layout-split-full .split-items {
    flex: 1; list-style: none;
    display: flex; flex-direction: column;
    justify-content: space-evenly;
    margin-top: 32px;
  }
  .layout-split-full .split-items li {
    font-family: var(--font-body);
    font-size: 34px; line-height: 1.35;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .layout-split-full .split-items li:last-child { border-bottom: none; }
  .layout-split-full .split-col.light .split-items li {
    color: #000; font-weight: 600;
    border-bottom-color: rgba(0,0,0,0.08);
  }
  .layout-split-full .split-col.dark .split-items li { color: var(--color-body); }

  /* split-compact: columnas con altura fija, centradas */
  .layout-split-compact {
    flex-direction: column;
    justify-content: center;
    gap: 48px;
  }
  .layout-split-compact .split-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .layout-split-compact .split-col.dark  { background: rgba(0,0,0,0.55); border-radius: 12px; padding: 28px; }
  .layout-split-compact .split-col.light { background: rgba(255,255,255,0.92); border-radius: 12px; padding: 28px; }
  .layout-split-compact .split-col.light .split-label { color: #000 !important; opacity: 0.5; }
  .layout-split-compact .split-col.dark  .split-label { color: var(--color-acento) !important; opacity: 0.7; }

  .split-label {
    font-family: var(--font-mono);
    font-size: 22px; letter-spacing: 0.2em;
    text-transform: uppercase; line-height: 1.4;
  }
  .split-col.dark  .split-label { color: var(--color-acento); opacity: 0.6; }
  .split-col.light .split-label { color: #000; opacity: 0.5; }

  /* ══════════════════════════════════════════
     QUOTE — layouts
  ══════════════════════════════════════════ */

  /* quote-dominant: quote XL domina, attr + note abajo anclados */
  .layout-quote-dominant {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-quote-dominant .quote-top {
    margin-top: calc(var(--pad) * 1.1);
    flex: 1;
    display: flex; align-items: flex-start;
  }
  .layout-quote-dominant .quote-text {
    font-family: var(--font-display);
    font-size: 72px; font-weight: 900;
    color: var(--color-headline);
    line-height: 1.05;
    text-transform: uppercase;
  }
  .layout-quote-dominant .quote-bottom {
    display: flex; flex-direction: column; gap: 20px;
    border-top: 2px solid var(--color-acento);
    padding-top: 40px;
    opacity: 0.9;
  }
  .layout-quote-dominant .quote-attr {
    font-family: var(--font-display);
    font-size: 52px; font-weight: 900;
    color: var(--color-acento);
    text-transform: uppercase; letter-spacing: 0.02em;
  }
  .layout-quote-dominant .quote-note {
    font-family: var(--font-body);
    font-size: 30px; color: var(--color-body);
    line-height: 1.7;
  }

  /* quote-centered: todo centrado, minimalista */
  .layout-quote-centered {
    flex-direction: column;
    justify-content: center;
    gap: 56px;
  }
  .layout-quote-centered .quote-text {
    font-family: var(--font-display);
    font-size: 64px; font-weight: 700;
    color: var(--color-headline);
    line-height: 1.1;
  }
  .layout-quote-centered .quote-attr {
    font-family: var(--font-display);
    font-size: 44px; font-weight: 900;
    color: var(--color-acento);
    text-transform: uppercase;
  }
  .layout-quote-centered .quote-note {
    font-family: var(--font-body);
    font-size: 30px; color: var(--color-body);
    line-height: 1.7;
  }

  /* ══════════════════════════════════════════
     CTA — layouts
  ══════════════════════════════════════════ */

  /* cta-top: headline arriba, sub + footer abajo */
  .layout-cta-top {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-cta-top .cta-main {
    margin-top: calc(var(--pad) * 1.2);
    display: flex; flex-direction: column; gap: 48px;
  }
  .layout-cta-top .cta-footer {
    display: flex; align-items: center; justify-content: space-between;
  }

  /* cta-center: todo centrado */
  .layout-cta-center {
    flex-direction: column;
    justify-content: center;
    gap: 48px;
  }
  .layout-cta-center .cta-footer {
    position: absolute;
    bottom: var(--safe-bottom); left: var(--pad); right: var(--pad);
    display: flex; align-items: center; justify-content: space-between;
  }

  /* cta-impact: headline XL ocupa casi todo */
  .layout-cta-impact {
    flex-direction: column;
    justify-content: space-between;
  }
  .layout-cta-impact .cta-main {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 40px;
  }
  .layout-cta-impact .cta-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .layout-cta-impact .cta-hl {
    font-size: 160px !important;
    line-height: 0.80 !important;
  }

  .cta-hl {
    font-family: var(--font-display);
    font-size: 140px; font-weight: 900;
    color: var(--color-headline);
    text-transform: uppercase;
    line-height: 0.82; white-space: pre-line;
  }
  .cta-sub {
    font-family: var(--font-body);
    font-size: 36px; color: var(--color-body);
    line-height: 1.8; white-space: pre-line;
  }

  /* ════════════════════════════════════════════════════════
     MODELO A — SPLIT VERTICAL (split_v)
     Dos fotos apiladas, texto sobre cada mitad
  ════════════════════════════════════════════════════════ */
  .slide-split-v {
    width: 100%; height: 100%;
    display: none; flex-direction: column;
    position: relative;
  }
  .slide-split-v.active { display: flex; }
  .sv-half {
    flex: 1; position: relative; overflow: hidden;
    display: flex;
  }
  .sv-half .sv-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    z-index: 0;
  }
  .sv-half .sv-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.12) 55%, rgba(0,0,0,0.82) 100%);
  }
  .sv-half .sv-text {
    position: relative; z-index: 1;
    padding: 52px 64px;
    display: flex; flex-direction: column; gap: 8px;
    align-self: flex-end;
  }
  /* Default: ambas mitades anclan el texto contra el divisor central,
     donde el scrim es más denso — evita tapar caras/cuerpos que suelen
     quedar centrados en cada foto. */
  .sv-half.top .sv-text { align-items: flex-end; width: 100%; text-align: right; }
  .sv-half.bottom .sv-text { align-items: flex-start; }

  /* Overrides según el análisis de composición por foto (FASE 3B) —
     misma especificidad que las reglas .top/.bottom de arriba, así que
     gana por orden de declaración cuando la IA eligió otra esquina. */
  .sv-half .sv-text.align-left  { align-items: flex-start; text-align: left; width: auto; }
  .sv-half .sv-text.align-right { align-items: flex-end; text-align: right; width: 100%; }
  .sv-half .sv-text.valign-top    { align-self: flex-start; }
  .sv-half .sv-text.valign-bottom { align-self: flex-end; }

  /* Si el texto va arriba de su mitad (lejos del divisor), el scrim
     denso también se mueve arriba */
  .sv-half.scrim-top .sv-bg::after {
    background: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.12) 45%, rgba(0,0,0,0.08) 100%);

<body>
<div class="slide-wrapper" id="slideWrapper"></div>
<script id="slide-data" type="application/json">__DATA__</script>
<script src="render-core.js"></script>
<script>
  const data    = JSON.parse(document.getElementById('slide-data').textContent);
  const wrapper = document.getElementById('slideWrapper');
  const sistema = data._sistema || {};

  RC.wrapper  = wrapper;
  RC.gOverlay = data.overlay ?? 0.65;
  RC.logo     = data._logo || null;
  RC.ARROW    = sistema.iconos?.flecha_derecha || '→';

  aplicarSistema(sistema, wrapper);

  data.slides.forEach((s, i) => wrapper.appendChild(buildAny(s, i, data.slides.length)));

  // Aplicar overrides de usuario (posiciones/colores/textos editados manualmente)
  if (data._userOverrides) {
    Object.entries(data._userOverrides).forEach(([slideId, overrides]) => {
      const slide = document.getElementById(slideId);
      if (!slide) return;
      Object.entries(overrides).forEach(([sel, styles]) => {
        const el = slide.querySelector(sel);
        if (!el) return;
        const { textContent: tc, ...css } = styles;
        Object.assign(el.style, css);
        if (tc != null) el.textContent = tc;
      });
    });
  }

  window.__showSlide = (i) => {
    data.slides.forEach((_, idx) => {
      const sec = document.getElementById(`slide-${idx+1}`);
      if (sec) sec.classList.toggle('active', idx === i);
    });
    const active = document.getElementById(`slide-${i+1}`);
    if (!active) return;
    if (active.classList.contains('slide')) autofitHeadlines(active);
    if (active.classList.contains('slide-split-v')) autofitSvContrast(active);
  };

  // ── EDIT MODE ─────────────────────────────────────────────────────────
  // Activado cuando el server inyecta data._editMode = true.
  // Hace todos los elementos de texto arrastrables (pointer events),
  // editables (dblclick → contentEditable) y configurables (postMessage).
  if (data._editMode) {
    const EDIT_SEL = [
      '.cover-headline','.cover-detail','.cover-kicker','.cover-tag',
      '.slide-tag','.cover-footer','.brand-handle',
      '.list-headline','.list-eyebrow',
      '.statement-headline','.statement-body',
      '.quote-text','.quote-attr','.quote-note',
      '.cta-headline','.cta-sub','.cta-handle',
      '.gr-headline',
      '.bn-stat','.bn-label','.bn-body',
      '.tl-headline','.tl-eyebrow',
    ];

    let selEl = null;
    let curIdx = 0;

    function activateSlide(idx) {
      curIdx = idx;
      const slide = document.getElementById(`slide-${idx + 1}`);
      if (!slide) return;

      // Aplicar overrides guardados antes de convertir a absolute
      const ov = (data._userOverrides || {})[`slide-${idx + 1}`] || {};
      Object.entries(ov).forEach(([sel, styles]) => {
        const el = slide.querySelector(sel);
        if (!el) return;
        const { textContent: tc, ...css } = styles;
        Object.assign(el.style, css);
        if (tc != null) el.textContent = tc;
      });

      // Convertir todos los elementos editables a position:absolute
      EDIT_SEL.forEach(s => slide.querySelectorAll(s).forEach(el => attach(el, slide)));

      window.parent.postMessage({ type: 'ready', total: data.slides.length }, '*');
    }

    function attach(el, slide) {
      if (el._editAttached) return;
      el._editAttached = true;

      const sr = slide.getBoundingClientRect();
      const er = el.getBoundingClientRect();

      el.style.position  = 'absolute';
      el.style.left      = (er.left - sr.left) + 'px';
      el.style.top       = (er.top  - sr.top)  + 'px';
      el.style.width     = er.width + 'px';
      el.style.margin    = '0';
      el.style.cursor    = 'grab';
      el._rot            = el._rot || 0;

      let drag = false, sx, sy, ol, ot;

      el.addEventListener('pointerdown', e => {
        if (el.contentEditable === 'true') return;
        if (e.detail >= 2) return;
        e.preventDefault(); e.stopPropagation();
        drag = true;
        sx = e.clientX; sy = e.clientY;
        ol = parseFloat(el.style.left) || 0;
        ot = parseFloat(el.style.top)  || 0;
        el.style.cursor = 'grabbing';
        el.style.zIndex = '999';
        el.setPointerCapture(e.pointerId);
        pick(el);
      });

      el.addEventListener('pointermove', e => {
        if (!drag) return;
        el.style.left = (ol + e.clientX - sx) + 'px';
        el.style.top  = (ot + e.clientY - sy) + 'px';
      });

      el.addEventListener('pointerup', () => {
        if (!drag) return;
        drag = false;
        el.style.cursor = 'grab';
        el.style.zIndex = '';
        push();
      });

      el.addEventListener('dblclick', e => {
        e.stopPropagation();
        el.contentEditable = 'true';
        el.style.cursor = 'text';
        el.focus();
        pick(el);
      });

      el.addEventListener('blur', () => {
        el.contentEditable = 'false';
        el.style.cursor = 'grab';
        if (selEl === el) el.style.outline = '2px solid #e8ff00';
        push();
      });

      el.addEventListener('click', e => { e.stopPropagation(); pick(el); });
      el.addEventListener('keydown', e => { if (e.key === 'Escape') el.blur(); });
    }

    function pick(el) {
      if (selEl && selEl !== el) { selEl.style.outline = ''; selEl.style.outlineOffset = ''; }
      selEl = el;
      el.style.outline = '2px solid #e8ff00';
      el.style.outlineOffset = '3px';
      const cs = getComputedStyle(el);
      window.parent.postMessage({
        type: 'selected',
        props: {
          color:    toHex(cs.color),
          fontSize: Math.round(parseFloat(cs.fontSize)),
          rotation: el._rot || 0,
          bold:     parseInt(cs.fontWeight) >= 700,
          text:     el.textContent,
        }
      }, '*');
    }

    function push() {
      window.parent.postMessage({ type: 'stateChange', overrides: collect() }, '*');
    }

    function collect() {
      const slide = document.getElementById(`slide-${curIdx + 1}`);
      if (!slide) return {};
      const map = {};
      EDIT_SEL.forEach(s => {
        slide.querySelectorAll(s).forEach(el => {
          if (!el._editAttached) return;
          const cls = Array.from(el.classList).find(c => EDIT_SEL.some(sel => sel === '.' + c));
          const key = cls ? ('.' + cls) : (el.className ? ('.' + el.className.trim().split(/\s+/)[0]) : el.tagName.toLowerCase());
          map[key] = {
            position:   'absolute',
            left:       el.style.left,
            top:        el.style.top,
            width:      el.style.width,
            margin:     '0',
            color:      el.style.color || '',
            fontSize:   el.style.fontSize || '',
            fontWeight: el.style.fontWeight || '',
            transform:  el.style.transform || '',
            textContent: el.textContent,
          };
        });
      });
      return { [`slide-${curIdx + 1}`]: map };
    }

    function toHex(c) {
      const d = document.createElement('div');
      d.style.color = c; document.body.appendChild(d);
      const rgb = getComputedStyle(d).color; document.body.removeChild(d);
      const m = rgb.match(/\d+/g);
      if (!m) return '#ffffff';
      return '#' + m.slice(0,3).map(n => (+n).toString(16).padStart(2,'0')).join('');
    }

    window.addEventListener('message', e => {
      const d = e.data || {};
      if (d.type === 'activate') { activateSlide(d.idx ?? 0); return; }
      if (d.type === 'showSlide') {
        window.__showSlide(d.idx);
        setTimeout(() => { curIdx = d.idx; }, 80);
        return;
      }
      if (!selEl) return;
      if (d.type === 'setColor')    { selEl.style.color = d.v; push(); }
      if (d.type === 'setSize')     { selEl.style.fontSize = d.v + 'px'; push(); }
      if (d.type === 'setRotation') {
        selEl._rot = d.v;
        const base = (selEl.style.transform || '').replace(/rotate\([^)]+\)/g, '').trim();
        selEl.style.transform = (base + ` rotate(${d.v}deg)`).trim();
        push();
      }
      if (d.type === 'toggleBold') {
        const fw = parseInt(getComputedStyle(selEl).fontWeight);
        selEl.style.fontWeight = fw >= 700 ? '400' : '900';
        push();
      }
      if (d.type === 'deselect') { if (selEl) { selEl.style.outline = ''; selEl = null; } }
    });

    wrapper.addEventListener('click', e => {
      if (e.target === wrapper || e.target.classList.contains('slide-bg') || e.target.classList.contains('slide')) {
        if (selEl) { selEl.style.outline = ''; selEl = null; }
        window.parent.postMessage({ type: 'deselect' }, '*');
      }
    });
  }
